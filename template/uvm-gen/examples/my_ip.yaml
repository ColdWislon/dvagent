# ------------------------------------------------------------------------------
# Example base configuration for uvm-gen.
#   python3 uvm_gen.py examples/my_ip.yaml -o /path/to/work
# Shared spec lives here; per-configuration YAMLs (my_ip_small.yaml,
# my_ip_large.yaml) extend it and override config_name/params only.
# ------------------------------------------------------------------------------
ip_name: my_ip

dut:
  module: my_ip_top
  rtl_filelist: ../rtl/dut.f      # relative to this file; $VARS are expanded.
                                  # While it doesn't resolve, the flow uses the
                                  # generated DUT stub automatically.

config_name: default

params:                            # RTL parameters/defines -> xrun flags and
  DATA_W: 32                       # typed fields in my_ip_env_cfg
  FIFO_DEPTH: 16

# param_style: define              # 'define' (default): +define+NAME=VALUE
                                   # 'defparam': -defparam <tb>.dut.NAME=VALUE

agents:                            # custom (non-VIP) interfaces
  - name: ctrl
    mode: active
  - name: stat
    mode: passive                  # monitor/coverage only, no driver/sequencer

vips:                              # Cadence VIP instances (apb | ahb | i3c | lpdp)
  - protocol: apb
    name: apb_cfg
    role: master                   # protocol-appropriate roles; 'monitor' = passive
