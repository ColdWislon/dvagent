; DV dashboard configuration — versioned team policy.
; [tool] is THE tool-abstraction layer: everything Xcelium/dv-flow specific.
; Defaults below equal the built-in xcelium profile; edit to retarget the
; stack (e.g. questa/vcs) or a different repo layout — zero code change.

[tool]
name            = xcelium
status_dir      = dv/status
review_json     = review.json
lint_json       = lint.json
triage_json     = triage.json
session_glob    = session_*.json
exclusions_md   = dv/cov/exclusion_requests.md
vplan_md        = docs/vplan.md
scan_dirs       = dv,agents,env,seq_lib,tests,tb
scan_exts       = .sv,.svh
placeholder_tag = PLACEHOLDER-CHECK
vplan_tag       = VP-\d+
ip_glob         = */dv

[display]
title       = DV Dashboard
stale_hours = 48
